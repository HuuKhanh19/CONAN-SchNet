# Base configuration for CONAN-SchNet Project

defaults:
  - _self_

# Chọn dataset để train, override từ CLI: dataset=esol
dataset_name: esol
random_seed_train: 0
gpu: 1

# Experiment settings
experiment:
  output_dir: "experiments"
  log_level: "INFO"

# Dataset configs 
datasets:
  esol:
    name: "esol"
    file: "refined_ESOL.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  freesolv:
    name: "freesolv"
    file: "refined_FreeSolv.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  lipo:
    name: "lipo"
    file: "refined_Lipophilicity.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  bace:
    name: "bace"
    file: "refined_BACE.csv"
    smiles_column: "smiles"
    target_column: "class"
    task_type: "classification"
    metric: "auc"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]
  split_method: "random_scaffold"
  random_seed_split: 0

# Conformer generation
conformer:
  num_conformers: 1        # Single ETKDG conformer per molecule
  max_attempts: 500        # Max ETKDG attempts
  prune_rms_thresh: 0.0    # RMSD threshold for pruning
  use_random_coords: false
  optimize_mmff: true     # No MMFF optimization
  random_seed_gen: 42

# SchNet model settings
schnet:
  n_atom_basis: 128        # Embedding dimension
  n_interactions: 6        # Number of interaction blocks
  n_rbf: 50                # Number of radial basis functions
  cutoff: 5.0              # Cutoff distance (Angstrom)
  n_filters: 128           # Number of filters in continuous-filter conv
  atomref: null             # Atomic reference energies (null = learn from data)

# Training settings (Step 1 - SGD baseline)
training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  scheduler: "reduce_on_plateau"
  scheduler_patience: 25
  scheduler_factor: 0.5
  early_stopping_patience: 100
  save_checkpoints: true
  gradient_clip: 1.0

# EGGROLL settings (Step 2 & Step 3 backbone)
eggroll:
  population_size: 128
  rank: 1
  sigma: 0.01
  learning_rate: 0.1
  num_generations: 600
  use_antithetic: true
  normalize_fitness: true
  rank_transform: true
  centered_rank: true
  weight_decay: 0.0
  lr_decay: 0.98
  sigma_decay: 0.98
  patience: 200
  eval_every: 5