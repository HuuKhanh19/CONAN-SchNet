# =============================================================================
# CONAN: Base Configuration (Hydra)
# =============================================================================

defaults:
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null

# ___ Global Settings _________________________________________________________
dataset_name: esol
random_seed_train: 0
gpu: 0

# ___ Experiment ______________________________________________________________
experiment:
  output_dir: "experiments"
  log_level: "INFO"
  verbose: false

# ___ Dataset Definitions ____________________________________________________
datasets:
  esol:
    name: "esol"
    file: "refined_ESOL.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  freesolv:
    name: "freesolv"
    file: "refined_FreeSolv.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  lipo:
    name: "lipo"
    file: "refined_Lipophilicity.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  bace:
    name: "bace"
    file: "refined_BACE.csv"
    smiles_column: "smiles"
    target_column: "class"
    task_type: "classification"
    metric: "auc"

# ___ Data / Splitting _______________________________________________________
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]
  split_method: "random_scaffold"
  random_seed_split: 0

# ___ Conformer Generation ___________________________________________________
conformer:
  num_conformers: 5
  max_attempts: 500
  prune_rms_thresh: 0.0
  use_random_coords: false
  optimize_mmff: true
  random_seed_gen: 42

# ___ UniMol v1 Model ________________________________________________________
unimol:
  data_type: "molecule"
  remove_hs: false
  max_atoms: 256
  pooler_dropout: 0.0

# ___ Training (Step 1 - Adam baseline, matching UniMol repo defaults) ________
training:
  epochs: 100
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.0
  scheduler: "warmup_linear"
  warmup_ratio: 0.03
  early_stopping_patience: 10
  save_checkpoints: true
  gradient_clip: 5.0

# ___ EGGROLL (Step 2) _______________________________________________________
# Tuned to match UniMol EGGROLL config that achieved test RMSE=0.85
eggroll:
  sigma: 0.01
  sigma_decay: 0.99
  rank: 16
  pop_size: 32
  group_size: 0
  inner_opt: "sgd"
  learning_rate: 0.1
  lr_decay: 0.99
  base_seed: 42