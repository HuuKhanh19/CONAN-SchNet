# =============================================================================
# CONAN-SchNet: Base Configuration (Hydra)
# =============================================================================
# Step 3 usage:
#   python scripts/run_step3.py dataset_name=esol random_seed_train=0 gpu=1 \
#       step3.pretrained_path=experiments/step2/esol/seed_2/20260402_013843/best_model.pt
# =============================================================================

defaults:
  - _self_

# ___ Global Settings _________________________________________________________
dataset_name: esol
random_seed_train: 0
gpu: 0

# ___ Experiment ______________________________________________________________
experiment:
  output_dir: "experiments"
  log_level: "INFO"
  verbose: false

# ___ Dataset Definitions ____________________________________________________
datasets:
  esol:
    name: "esol"
    file: "refined_ESOL.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  freesolv:
    name: "freesolv"
    file: "refined_FreeSolv.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  lipo:
    name: "lipo"
    file: "refined_Lipophilicity.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  bace:
    name: "bace"
    file: "refined_BACE.csv"
    smiles_column: "smiles"
    target_column: "class"
    task_type: "classification"
    metric: "auc"

# ___ Data / Splitting _______________________________________________________
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]
  split_method: "random_scaffold"
  random_seed_split: 0

# ___ Conformer Generation ___________________________________________________
conformer:
  num_conformers: 10           # K=10 conformers per molecule for Step 3
  max_attempts: 500
  prune_rms_thresh: 0.0
  use_random_coords: false
  optimize_mmff: true
  random_seed_gen: 42

# ___ SchNet Model ___________________________________________________________
schnet:
  n_atom_basis: 128
  n_interactions: 6
  n_rbf: 50
  cutoff: 5.0
  n_filters: 128
  atomref: null

# ___ Training (Step 1 _ Adam baseline) ______________________________________
training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  scheduler: "reduce_on_plateau"
  scheduler_patience: 25
  scheduler_factor: 0.5
  early_stopping_patience: 100
  save_checkpoints: true
  gradient_clip: 1.0

# ___ EGGROLL (Step 2) ______________________________________________________
eggroll:
  population_size: 32
  rank: 4
  sigma: 0.01
  learning_rate: 0.001
  optimizer: "sgd"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_eps: 0.00000001
  normalize_fitness: true
  rank_transform: false
  centered_rank: true
  use_antithetic: true
  lr_decay: 0.999
  sigma_decay: 0.999
  weight_decay: 0.00001
  num_generations: 400
  patience: 150
  eval_every: 5

# ___ Step 3: Joint EGGROLL _ GP ____________________________________________
step3:
  # Path to Step 2 pretrained weights
  pretrained_path: "experiments/step2/esol/seed_2/20260402_013843/best_model.pt"

  # Training control
  num_iterations: 500
  eval_every: 5
  patience: 100

  # EGGROLL config (can override step 2 defaults)
  eggroll:
    population_size: 32          # N=32 (16 unique + 16 antithetic)
    rank: 4                      # r=4
    sigma: 0.01
    learning_rate: 0.0005
    optimizer: "sgd"              # sgd for Step 3 (faster learning)
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 0.00000001
    normalize_fitness: true
    rank_transform: false
    centered_rank: true
    use_antithetic: true
    lr_decay: 0.999              # slower decay for Step 3
    sigma_decay: 0.999
    weight_decay: 0.00001

  # GP Combiner config
  gp:
    population_size: 200         # Q=200 GP trees
    max_tree_len: 127
    max_layer_cnt: 5
    layer_leaf_prob: 0.3
    const_range: [-1.0, 1.0]
    using_funcs:
      - '+'
      - '-'
      - '*'
      - 'loose_div'
      - 'sin'
      - 'cos'
      - 'exp'
      - 'neg'
      - 'abs'
      - 'tanh'
      - 'loose_sqrt'
    tournament_size: 8
    crossover_rate: 0.8
    mutation_rate: 0.15

  # Memory chunking (adjust based on GPU memory)
  chunking:
    n_chunk: 4                   # process 8 perturbations at a time for GP
    q_chunk: 10                  # process 20 GP trees at a time