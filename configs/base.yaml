# =============================================================================
# CONAN-SchNet: Base Configuration (Hydra)
# =============================================================================
# Override from CLI:
#   python scripts/run_step1.py dataset_name=freesolv random_seed_train=42 gpu=0
# =============================================================================

defaults:
  - _self_

# ─── Global Settings ─────────────────────────────────────────────────────────
dataset_name: esol            # Override: dataset_name=freesolv
random_seed_train: 0          # Seed for training (model init, optimizer, shuffle)
gpu: 0

# ─── Experiment ──────────────────────────────────────────────────────────────
experiment:
  output_dir: "experiments"
  log_level: "INFO"
  verbose: false              # Set true to print parameter shapes at startup

# ─── Dataset Definitions ────────────────────────────────────────────────────
datasets:
  esol:
    name: "esol"
    file: "refined_ESOL.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  freesolv:
    name: "freesolv"
    file: "refined_FreeSolv.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  lipo:
    name: "lipo"
    file: "refined_Lipophilicity.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  bace:
    name: "bace"
    file: "refined_BACE.csv"
    smiles_column: "smiles"
    target_column: "class"
    task_type: "classification"
    metric: "auc"

# ─── Data / Splitting ───────────────────────────────────────────────────────
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]
  split_method: "random_scaffold"
  random_seed_split: 1        # Seed cho scaffold split (tách biệt khỏi training)

# ─── Conformer Generation ───────────────────────────────────────────────────
conformer:
  num_conformers: 1
  max_attempts: 500
  prune_rms_thresh: 0.0
  use_random_coords: false
  optimize_mmff: true
  random_seed_gen: 42         # Seed cho ETKDG conformer generation

# ─── SchNet Model ───────────────────────────────────────────────────────────
schnet:
  n_atom_basis: 128
  n_interactions: 6
  n_rbf: 50
  cutoff: 5.0
  n_filters: 128
  atomref: null

# ─── Training (Step 1 – Adam baseline) ──────────────────────────────────────
training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  scheduler: "reduce_on_plateau"
  scheduler_patience: 25
  scheduler_factor: 0.5
  early_stopping_patience: 100
  save_checkpoints: true
  gradient_clip: 1.0

# ─── EGGROLL (Step 2) ──────────────────────────────────────────────────────
eggroll:
  population_size: 128
  rank: 1
  sigma: 0.01
  learning_rate: 0.1
  num_generations: 400
  use_antithetic: true
  normalize_fitness: true
  rank_transform: true
  centered_rank: true
  weight_decay: 0.0
  lr_decay: 0.99
  sigma_decay: 0.99
  patience: 200
  eval_every: 5