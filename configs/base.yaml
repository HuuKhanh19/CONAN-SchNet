# Base configuration for CONAN-SchNet Project

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]
  split_method: "scaffold"
  random_seed: 42

# SchNet model settings
schnet:
  n_atom_basis: 128        # Embedding dimension
  n_interactions: 6        # Number of interaction blocks
  n_rbf: 50                # Number of radial basis functions
  cutoff: 5.0              # Cutoff distance (Angstrom)
  n_filters: 128           # Number of filters in continuous-filter conv
  atomref: null             # Atomic reference energies (null = learn from data)

# Conformer generation
conformer:
  num_conformers: 1        # Single ETKDG conformer per molecule
  max_attempts: 500        # Max ETKDG attempts
  prune_rms_thresh: 0.5    # RMSD threshold for pruning
  use_random_coords: false
  optimize_mmff: false      # No MMFF optimization

# Training settings (Step 1 - SGD baseline)
training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.0005
  weight_decay: 0.00001
  scheduler: "reduce_on_plateau"
  scheduler_patience: 25
  scheduler_factor: 0.5
  early_stopping_patience: 50
  save_checkpoints: true
  gradient_clip: 1.0

# EGGROLL settings (Step 2)
eggroll:
  population_size: 32
  rank: 16
  sigma: 0.01
  learning_rate: 0.1
  num_generations: 400
  use_antithetic: true
  normalize_fitness: true
  rank_transform: true
  centered_rank: true
  weight_decay: 0.0
  lr_decay: 0.99
  sigma_decay: 0.99
  patience: 200

# GP settings (Step 3)
gp:
  population_size: 50
  max_depth: 4
  tournament_size: 5
  crossover_prob: 0.8
  mutation_prob: 0.2
  elitism: 3
  input_dim: 128            # SchNet embedding dimension

# Experiment settings
experiment:
  output_dir: "experiments"
  log_level: "INFO"