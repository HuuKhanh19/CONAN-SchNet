# =============================================================================
# CONAN-SchNet: Base Configuration (Hydra)
# =============================================================================
# Override from CLI:
#   python scripts/run_step1.py dataset_name=freesolv random_seed_train=42 gpu=0
# =============================================================================

defaults:
  - _self_

# ─── Global Settings ─────────────────────────────────────────────────────────
dataset_name: esol            # Override: dataset_name=freesolv
random_seed_train: 0          # Seed for training (model init, optimizer, shuffle)
gpu: 0

# ─── Experiment ──────────────────────────────────────────────────────────────
experiment:
  output_dir: "experiments"
  log_level: "INFO"
  verbose: false              # Set true to print parameter shapes at startup

# ─── Dataset Definitions ────────────────────────────────────────────────────
datasets:
  esol:
    name: "esol"
    file: "refined_ESOL.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  freesolv:
    name: "freesolv"
    file: "refined_FreeSolv.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  lipo:
    name: "lipo"
    file: "refined_Lipophilicity.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  bace:
    name: "bace"
    file: "refined_BACE.csv"
    smiles_column: "smiles"
    target_column: "class"
    task_type: "classification"
    metric: "auc"

# ─── Data / Splitting ───────────────────────────────────────────────────────
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]
  split_method: "random_scaffold"
  random_seed_split: 0        # Seed cho scaffold split (tách biệt khỏi training)

# ─── Conformer Generation ───────────────────────────────────────────────────
conformer:
  num_conformers: 1
  max_attempts: 500
  prune_rms_thresh: 0.0
  use_random_coords: false
  optimize_mmff: true
  random_seed_gen: 42         # Seed cho ETKDG conformer generation

# ─── SchNet Model ───────────────────────────────────────────────────────────
schnet:
  n_atom_basis: 128
  n_interactions: 6
  n_rbf: 50
  cutoff: 5.0
  n_filters: 128
  atomref: null

# ─── Training (Step 1 – Adam baseline) ──────────────────────────────────────
training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  scheduler: "reduce_on_plateau"
  scheduler_patience: 25
  scheduler_factor: 0.5
  early_stopping_patience: 100
  save_checkpoints: true
  gradient_clip: 1.0

# ─── EGGROLL (Step 2) ──────────────────────────────────────────────────────
eggroll:
  # Core (Eq. 8 in paper)
  population_size: 32           # N: number of perturbations per generation
  rank: 4                       # r: rank of each perturbation (N*r=128 ≥ min(m,n))
  sigma: 0.01                   # σ: noise scale for perturbations
  learning_rate: 0.001          # α: step size (scaled by √N internally, matching repo gốc)

  # Fitness shaping (repo gốc default: z-score)
  normalize_fitness: true       # z-score: (f - mean) / std
  rank_transform: false         # if true, use rank-based shaping instead of z-score
  centered_rank: true           # only used if rank_transform=true

  # Antithetic sampling
  use_antithetic: true          # ±E pairs to halve variance

  # Schedules & regularization
  lr_decay: 0.999               # lr *= lr_decay each generation
  sigma_decay: 0.999            # σ *= sigma_decay each generation
  weight_decay: 0.00001         # L2 regularization (match step 1)

  # Training control
  num_generations: 400          # max generations
  patience: 200                 # early stopping patience (in generations)
  eval_every: 5                 # validate every N generations