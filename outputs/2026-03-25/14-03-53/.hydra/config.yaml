dataset_name: esol
datasets:
  esol:
    name: esol
    file: refined_ESOL.csv
    smiles_column: smiles
    target_column: measured
    task_type: regression
    metric: rmse
  freesolv:
    name: freesolv
    file: refined_FreeSolv.csv
    smiles_column: smiles
    target_column: measured
    task_type: regression
    metric: rmse
  lipo:
    name: lipo
    file: refined_Lipophilicity.csv
    smiles_column: smiles
    target_column: measured
    task_type: regression
    metric: rmse
  bace:
    name: bace
    file: refined_BACE.csv
    smiles_column: smiles
    target_column: class
    task_type: classification
    metric: auc
data:
  raw_dir: data/raw
  processed_dir: data/processed
  split_ratio:
  - 0.8
  - 0.1
  - 0.1
  split_method: random_scaffold
  random_seed: 0
schnet:
  n_atom_basis: 128
  n_interactions: 6
  n_rbf: 50
  cutoff: 5.0
  n_filters: 128
  atomref: null
conformer:
  num_conformers: 5
  max_attempts: 500
  prune_rms_thresh: 0.0
  use_random_coords: false
  optimize_mmff: true
training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 1.0e-05
  scheduler: reduce_on_plateau
  scheduler_patience: 25
  scheduler_factor: 0.5
  early_stopping_patience: 50
  save_checkpoints: true
  gradient_clip: 1.0
eggroll:
  population_size: 32
  rank: 4
  sigma: 0.01
  learning_rate: 0.1
  num_generations: 400
  use_antithetic: true
  normalize_fitness: true
  rank_transform: true
  centered_rank: true
  weight_decay: 0.0
  lr_decay: 0.99
  sigma_decay: 0.99
  patience: 150
  eval_every: 5
gp:
  population_size: 200
  max_tree_len: 63
  max_layer_cnt: 6
  layer_leaf_prob: 0.3
  input_dim: 128
  output_dim: 1
  using_funcs:
  - +
  - '-'
  - '*'
  - loose_div
  - sin
  - cos
  - neg
  - abs
  - tanh
  - loose_sqrt
  const_range:
  - -1.0
  - 1.0
  sample_cnt: 1000
  crossover_rate: 0.8
  mutation_rate: 0.2
  tournament_size: 5
  elitism: 3
step3:
  warmup_generations: 50
experiment:
  output_dir: experiments
  log_level: INFO
