dataset_name: esol
random_seed_train: 0
gpu: 0
experiment:
  output_dir: experiments
  log_level: INFO
  verbose: false
datasets:
  esol:
    name: esol
    file: refined_ESOL.csv
    smiles_column: smiles
    target_column: measured
    task_type: regression
    metric: rmse
  freesolv:
    name: freesolv
    file: refined_FreeSolv.csv
    smiles_column: smiles
    target_column: measured
    task_type: regression
    metric: rmse
  lipo:
    name: lipo
    file: refined_Lipophilicity.csv
    smiles_column: smiles
    target_column: measured
    task_type: regression
    metric: rmse
  bace:
    name: bace
    file: refined_BACE.csv
    smiles_column: smiles
    target_column: class
    task_type: classification
    metric: auc
data:
  raw_dir: data/raw
  processed_dir: data/processed
  split_ratio:
  - 0.8
  - 0.1
  - 0.1
  split_method: random_scaffold
  random_seed_split: 2
conformer:
  num_conformers: 10
  max_attempts: 500
  prune_rms_thresh: 0.0
  use_random_coords: false
  optimize_mmff: true
  random_seed_gen: 42
schnet:
  n_atom_basis: 128
  n_interactions: 6
  n_rbf: 50
  cutoff: 5.0
  n_filters: 128
  atomref: null
training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 1.0e-05
  scheduler: reduce_on_plateau
  scheduler_patience: 25
  scheduler_factor: 0.5
  early_stopping_patience: 100
  save_checkpoints: true
  gradient_clip: 1.0
eggroll:
  population_size: 32
  rank: 4
  sigma: 0.01
  learning_rate: 0.001
  optimizer: sgd
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_eps: 1.0e-08
  normalize_fitness: true
  rank_transform: false
  centered_rank: true
  use_antithetic: true
  lr_decay: 0.99
  sigma_decay: 0.99
  weight_decay: 1.0e-05
  num_generations: 400
  patience: 150
  eval_every: 5
step3:
  pretrained_path: experiments/step2/esol/seed_2/20260402_013843/best_model.pt
  num_iterations: 500
  eval_every: 5
  patience: 100
  eggroll:
    population_size: 32
    rank: 4
    sigma: 0.01
    learning_rate: 0.001
    optimizer: sgd
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    normalize_fitness: true
    rank_transform: false
    centered_rank: true
    use_antithetic: true
    lr_decay: 0.999
    sigma_decay: 0.999
    weight_decay: 1.0e-05
  gp:
    population_size: 200
    max_tree_len: 64
    max_layer_cnt: 4
    layer_leaf_prob: 0.3
    const_range:
    - -1.0
    - 1.0
    using_funcs:
    - +
    - '-'
    - '*'
    - loose_div
    - sin
    - cos
    - exp
    - neg
    - abs
    - tanh
    - loose_sqrt
    tournament_size: 7
    crossover_rate: 0.8
    mutation_rate: 0.15
  dim_chunk: 32
